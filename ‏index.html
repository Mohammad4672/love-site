<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruba 💖</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f001f,#2b003d,#ff2d75);
font-family:Tahoma;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* title */
h1{
position:absolute;
top:20px;
font-size:55px;
text-shadow:0 0 20px #ff99cc;
}

/* button */
.btn{
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff2d75;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

/* password */
.passBox{
display:none;
text-align:center;
}

input{
padding:10px;
border:none;
border-radius:10px;
text-align:center;
margin-top:10px;
}

/* HEART */
.heart{
position:absolute;
width:160px;
height:140px;
transform:scale(0.2) rotate(45deg);
transition:0.6s ease;
}

.left,.right{
position:absolute;
width:160px;
height:140px;
background:#ff4d88;
border-radius:50%;
transform:rotate(45deg);
}

.left{transition:0.6s;}
.right{transition:0.6s;}

.open .left{
transform:translateX(-40px) rotate(45deg);
}

.open .right{
transform:translateX(40px) rotate(45deg);
}

.break .left{
transform:translateX(-200px) rotate(60deg);
opacity:0;
}

.break .right{
transform:translateX(200px) rotate(-60deg);
opacity:0;
}

/* text */
.text{
margin-top:20px;
font-size:22px;
text-align:center;
max-width:80%;
min-height:150px;
white-space:pre-wrap;
}

/* secret */
.secret{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
font-size:22px;
text-align:center;
background:radial-gradient(circle,#ff4d88,#ff99bb);
padding:40px;
border-radius:50%;
width:320px;
height:320px;
display:flex;
align-items:center;
justify-content:center;
line-height:1.8;
}
</style>
</head>

<body>

<h1>Ruba 💖</h1>

<button class="btn" onclick="start()">افتحي القلب 💌</button>

<div class="passBox" id="passBox">
<div>password:</div>
<input id="pass">
<br>
<button onclick="checkPass()">دخول</button>
</div>

<div class="heart" id="heart">
<div class="left"></div>
<div class="right"></div>
</div>

<div class="text" id="text"></div>

<div class="secret" id="secret">
<div class="box">
أنا معكِ وحدك لآخر العمر ولتخلص الدنيا ❤️<br>
بحبككك كتيررر يا رُبى 💖
</div>
</div>

<script>

/* 💖 القلوب */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},600);

/* ✍️ الرسالة (غيّرها براحتك) */
let msg =
"قلبي انا كتيررر بحبك وبحياتي ما رح حب غيرك...\n"+
"وما رح يكون بقلبي غيرك ❤️\n"+
"يا احلى بنت بالدنيا ✨\n\n"+
"بدي ياكي دايما قوية 🌙\n"+
"وانشالله دايما بشوف ضحكتك 💕\n\n"+
"بحبككك يا احلى رُبى بالدنيا 💖";

let i=0;

/* start */
function start(){
document.querySelector(".btn").style.display="none";
document.getElementById("passBox").style.display="block";
}

/* password */
function checkPass(){
if(document.getElementById("pass").value==="1542004"){
document.getElementById("passBox").style.display="none";
openHeart();
}else{
alert("password غلط ❌");
}
}

/* heart animation */
function openHeart(){
let heart=document.getElementById("heart");
heart.classList.add("open");

setTimeout(()=>{
heart.classList.add("break");
type();
},700);
}

/* ✅ FIXED typing (no stuck words) */
function type(){
if(i < msg.length){

let span=document.createElement("span");
span.innerText=msg[i];
document.getElementById("text").appendChild(span);

i++;
setTimeout(type,35);

}else{
setTimeout(()=>{
document.getElementById("secret").style.display="flex";
},800);
}
}

</script>

</body>
</html>
