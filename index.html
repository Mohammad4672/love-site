<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💌 رسالة حب لـ Ruba</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  color:white;
  text-align:center;
}

/* 📅 التاريخ */
#التاريخ{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.2);
  padding:8px 15px;
  border-radius:20px;
  backdrop-filter:blur(6px);
  font-size:14px;
}

/* ❤️ القلب */
#قلب{
  position:fixed;
  top:80px;
  right:20px;
  font-size:28px;
  animation: نبض 1.2s infinite;
}

@keyframes نبض{
  0%{transform:scale(1)}
  50%{transform:scale(1.4)}
  100%{transform:scale(1)}
}

/* 🔐 القفل */
#القفل{
  background:rgba(255,255,255,0.15);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(8px);
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  text-align:center;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:white;
  color:#ff4d6d;
  margin-top:10px;
}

/* 💌 الرسالة */
#رسالة{
  background:white;
  color:#ff4d6d;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  min-width:250px;
  min-height:60px;
  font-size:16px;
}

/* المحتوى */
#المحتوى{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- 📅 التاريخ -->
<div id="التاريخ">📅 25/04/2025 - 3:21 | أحلى يوم بحياتي 💖</div>

<!-- ❤️ القلب -->
<div id="قلب">❤️</div>

<h2>💌 رسالة حب خاصة لـ Ruba</h2>

<!-- 🔐 القفل -->
<div id="القفل">
  <p>🔐 أدخل كلمة السر</p>
  <input id="password" placeholder="password">
  <br>
  <button onclick="check()">فتح 💖</button>
</div>

<!-- 💌 المحتوى -->
<div id="المحتوى">

  <div id="رسالة">
    💖 اضغط على زر “رسالة جديدة”
  </div>

  <button onclick="رسالة_جديدة()">💌 رسالة جديدة</button>

</div>

<script>

let الرسائل = [
"💖 انت البنت اللي بتستاهل الواحد يقدملا روحو",
"💌 إنتِ أجمل صدفة بحياتي",
"❤️ وجودك خلّى حياتي أحلى",
"💖 إنتِ احلى واحن واطيب بنت بالدنيا",
"💌  الدنيا ما بتحلى الا بوجودك يا قلبي",
"❤️ ما في غيرك بقلبي واكيد ما رح يكون في غيرك",
"💖 إنتِ أحلى شي بحياتي"
];

function check(){
  let p=document.getElementById("password").value;

  if(p==="1542004"){
    document.getElementById("القفل").style.display="none";
    document.getElementById("المحتوى").style.display="block";
  } else {
    alert("❌ كلمة السر غلط");
  }
}

// ✍️ تأثير الكتابة الحرفية
function رسالة_جديدة(){
  let i = Math.floor(Math.random() * الرسائل.length);
  let النص = الرسائل[i];

  let box = document.getElementById("رسالة");
  box.innerHTML = "";

  let index = 0;

  function اكتب(){
    if(index < النص.length){
      box.innerHTML += النص.charAt(index);
      index++;
      setTimeout(اكتب, 50);
    }
  }

  اكتب();
}

</script>

</body>
</html>
