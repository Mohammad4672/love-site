<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Ruba</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f001f,#2b003d,#ff2d75);
font-family:Tahoma;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* قلب متحرك */
.heart{
position:absolute;
bottom:-50px;
font-size:18px;
animation:float 7s linear forwards;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

.container{
text-align:center;
z-index:2;
padding:20px;
}

h1{
font-size:50px;
text-shadow:0 0 20px #ff99cc;
}

.text{
font-size:22px;
margin-top:20px;
min-height:120px;
white-space:pre-line;
}

.envelope{
margin-top:30px;
width:120px;
height:80px;
background:white;
border-radius:10px;
cursor:pointer;
display:none;
position:relative;
}

.envelope:before{
content:"";
position:absolute;
border-left:60px solid transparent;
border-right:60px solid transparent;
border-top:40px solid #ff4d88;
top:0;
left:0;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.card{
background:linear-gradient(45deg,#ff4d88,#ff99bb);
padding:30px;
border-radius:20px;
text-align:center;
font-size:24px;
}
</style>
</head>

<body>

<h1>رُبى 💖</h1>

<div class="container">

<div class="text" id="text"></div>

<div class="envelope" id="env" onclick="openSecret()"></div>

</div>

<div class="popup" id="popup">
<div class="card">
💌 رسالة سرّية:<br><br>
أنا معكِ لآخر العمر بموت فيكي ❤️
</div>
</div>

<script>

/* 💖 قلوب دايماً */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);
},500);

/* الرسالة */
let msg = "قلبي انا كتيررر بحبك 💖\nوما رح حب غيرك...\nوما رح يكون بقلبي غيرك ❤️\nيا احلى بنت بالدنيا ✨\n\nبدي ياكي قوية دايماً...\nوانا معك بكل اوقاتك 🌙\n\nبدي شوف ضحكتك الحلوة دايماً 💕\nوبشوفك احلى محامية بالدنيا 👩‍⚖️\n\nبس روقيلي حالك يا عمري 🫶\nوما تفكري كتير...\n\nبحبككك يا احلى ربى بالدنيا 💖";

let i=0;

function type(){
if(i < msg.length){
document.getElementById("text").innerText += msg.charAt(i);
i++;
setTimeout(type,35);
} else {
document.getElementById("env").style.display="block";
}
}

type();

/* الظرف */
function openSecret(){
document.getElementById("popup").style.display="flex";
}

</script>

</body>
</html>
