<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruba 💖</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f001f,#2b003d,#ff2d75);
font-family:Tahoma;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* title */
h1{
position:absolute;
top:20px;
font-size:55px;
text-shadow:0 0 20px #ff99cc;
}

/* button */
.btn{
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff2d75;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

/* password */
.passBox{
display:none;
text-align:center;
}

input{
padding:10px;
border:none;
border-radius:10px;
text-align:center;
margin-top:10px;
}

/* HEART */
.heart{
position:absolute;
bottom:-40px;
font-size:18px;
animation:float 7s linear forwards;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* typing text */
.text{
margin-top:20px;
font-size:22px;
text-align:center;
white-space:pre-wrap;
max-width:80%;
min-height:150px;
}

/* secret overlay */
.secret{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

/* envelope */
.envelopeBox{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.envelope{
width:160px;
height:100px;
background:white;
border-radius:10px;
position:relative;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
border-left:80px solid transparent;
border-right:80px solid transparent;
border-top:50px solid #ff4d88;
}

/* letter */
.letter{
display:none;
font-size:20px;
text-align:center;
background:linear-gradient(45deg,#ff4d88,#ff99bb);
padding:25px;
border-radius:15px;
max-width:300px;
line-height:2;
}
</style>
</head>

<body>

<h1>Ruba 💖</h1>

<button class="btn" onclick="start()">افتحي القلب 💌</button>

<div class="passBox" id="passBox">
<div>password:</div>
<input id="pass">
<br>
<button onclick="checkPass()">دخول</button>
</div>

<div class="text" id="text"></div>

<div class="secret" id="secret">

<div class="envelopeBox">
<div class="envelope" onclick="openLetter()"></div>

<div class="letter" id="letter">
أنا معكِ وحدك لآخر العمر ❤️
بحبككك كتيررر يا رُبى 💖
</div>

</div>

</div>

<script>

/* 💖 floating hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.textContent="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},600);

/* message (safe emojis) */
let msg =
"قلبي انا كتيررر بحبك وبحياتي ما رح حب غيرك...\n"+
"وما رح يكون بقلبي غيرك ❤️\n"+
"يا احلى بنت بالدنيا ✨\n\n"+
"بدي ياكي دايماً قوية وما تفكري كتير يا قلبي 🌙\n"+
"وانشالله دايما بشوف ضحكتك 💕\n\n"+
"بحبككك يا احلى رُبى بالدنيا 💖";

let i=0;

/* start */
function start(){
document.querySelector(".btn").style.display="none";
document.getElementById("passBox").style.display="block";
}

/* password */
function checkPass(){
if(document.getElementById("pass").value==="1542004"){
document.getElementById("passBox").style.display="none";
openHeart();
}else{
alert("password غلط ❌");
}
}

/* heart animation */
function openHeart(){
type();
}

/* typing FIX emojis safe */
function type(){
if(i < msg.length){

let span=document.createElement("span");
span.textContent = msg[i];   // 🔥 FIX EMOJIS
document.getElementById("text").appendChild(span);

i++;
setTimeout(type,35);

}else{
setTimeout(()=>{
document.getElementById("secret").style.display="flex";
},800);
}
}

/* open letter */
function openLetter(){
document.getElementById("letter").style.display="block";
}

</script>

</body>
</html>
