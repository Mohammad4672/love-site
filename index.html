<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💌 رسائل حب ل Ruba </title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  color:white;
  text-align:center;
}

/* 📅 التاريخ */
#التاريخ{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.2);
  padding:8px 15px;
  border-radius:20px;
  backdrop-filter:blur(6px);
  font-size:14px;
}

/* ❤️ القلب */
#قلب{
  position:fixed;
  top:80px;
  right:20px;
  font-size:28px;
  animation: نبض 1.2s infinite;
}

@keyframes نبض{
  0%{transform:scale(1)}
  50%{transform:scale(1.4)}
  100%{transform:scale(1)}
}

/* 💌 المقدمة */
#رسالة_افتتاحية{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.2);
  padding:15px 20px;
  border-radius:15px;
  backdrop-filter:blur(8px);
  animation: fadeIntro 4s forwards;
}

#رسالة_افتتاحية button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
  font-weight:bold;
}

@keyframes fadeIntro{
  0%{opacity:1}
  70%{opacity:1}
  100%{opacity:0}
}

/* 🔐 القفل */
#القفل{
  display:none;
  background:rgba(255,255,255,0.15);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(8px);
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  text-align:center;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:white;
  color:#ff4d6d;
  margin-top:10px;
}

/* 💌 الرسالة */
#رسالة{
  background:white;
  color:#ff4d6d;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  min-width:250px;
  min-height:60px;
}

/* المحتوى */
#المحتوى{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- 📅 التاريخ -->
<div id="التاريخ">📅 25/04/2025 - 3:21 | أحلى يوم بحياتي 💖</div>

<!-- ❤️ القلب -->
<div id="قلب">❤️</div>

<!-- 💌 المقدمة -->
<div id="رسالة_افتتاحية">
  💖 إذا جاهزة يا قلبي كبسي هون لتشوفي كم رسالة حلوين مني
  <br>
  <button onclick="إغلاق_المقدمة()">اضغطي هون 💌</button>
</div>

<h2>💌 رسالة حب خاصة لـ Ruba</h2>

<!-- 🔐 القفل -->
<div id="القفل">
  <p>🔐 أدخل كلمة السر</p>
  <input id="password" placeholder="password">
  <br>
  <button onclick="check()">فتح 💖</button>
</div>

<!-- 💌 المحتوى -->
<div id="المحتوى">

  <div id="رسالة">
    💖 اضغط على زر “رسالة جديدة”
  </div>

  <button onclick="رسالة_جديدة()">💌 رسالة جديدة</button>

</div>

<script>

/* إغلاق المقدمة */
function إغلاق_المقدمة(){
  document.getElementById("رسالة_افتتاحية").style.display="none";
  document.getElementById("القفل").style.display="block";
}

/* كلمة السر */
function check(){
  let p=document.getElementById("password").value;

  if(p==="1542004"){
    document.getElementById("القفل").style.display="none";
    document.getElementById("المحتوى").style.display="block";
    رسالة_نهائية();
  } else {
    alert("❌ كلمة السر غلط");
  }
}

/* الرسائل */
let الرسائل=[
"💖 انت البنت اللي بتستاهل الواحد يقدملا روحو",
"💌 إنتِ أجمل صدفة بحياتي",
"❤️ وجودك خلّى حياتي أحلى",
"💖 إنتِ احلى واحن واطيب بنت بالدنيا",
"💌 الدنيا ما بتحلى الا بوجودك يا قلبي",
"❤️ ما في غيرك بقلبي",
"💖 إنتِ أحلى شي بحياتي"
];

/* رسالة عادية */
function رسالة_جديدة(){
  let i=Math.floor(Math.random()*الرسائل.length);
  let النص=الرسائل[i];

  let box=document.getElementById("رسالة");
  box.innerHTML="";

  let index=0;
  let cursor=document.createElement("span");
  cursor.innerHTML="▌";
  box.appendChild(cursor);

  function اكتب(){
    if(index<nص.length){
      cursor.insertAdjacentText("beforebegin", النص.charAt(index));
      index++;
      setTimeout(اكتب,45);
    }else{
      cursor.remove();
    }
  }

  اكتب();
}

/* 🎧 صوت القلب */
let صوت_القلب = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a9d1f3.mp3?filename=heartbeat-ambient-110397.mp3");

/* الرسالة الأخيرة */
let الرسالة_الاخيرة=
"انتِ يا قلبي احلي شي بهالدنيا وبستاهلي كل شي حلو وانا اذا بقدملك روحي قليل عليكِ والله وانشالله الله ما يضيعلك تعب وشوفك احلى محامية بالدنيا بحبكك كتيييير💖";

function رسالة_نهائية(){

  let box=document.getElementById("رسالة");
  box.innerHTML="";

  صوت_القلب.currentTime=0;
  صوت_القلب.volume=0.6;
  صوت_القلب.play();

  let index=0;
  let cursor=document.createElement("span");
  cursor.innerHTML="▌";
  box.appendChild(cursor);

  function اكتب(){
    if(index<الرسالة_الاخيرة.length){
      cursor.insertAdjacentText("beforebegin", الرسالة_الاخيرة.charAt(index));
      index++;
      setTimeout(اكتب,45);
    }else{
      cursor.remove();
    }
  }

  اكتب();
}

</script>

</body>
</html>
