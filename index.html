<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Ruba ULTRA</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f001f,#2b003d,#ff2d75);
display:flex;
justify-content:center;
align-items:center;
font-family:Tahoma;
color:white;
}

/* نجوم خفيفة جداً */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.5;
animation:twinkle 5s infinite;
}

@keyframes twinkle{
0%{opacity:0.2;}
50%{opacity:0.8;}
100%{opacity:0.2;}
}

/* قلب واحد أو اثنين فقط (خفيف جداً) */
.heart{
position:absolute;
font-size:18px;
opacity:0.6;
animation:float 8s linear forwards;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

.container{
text-align:center;
z-index:2;
padding:20px;
}

.title{
font-size:55px;
text-shadow:0 0 20px #ff99cc;
}

.text{
font-size:22px;
line-height:2;
margin-bottom:30px;
}

.btn{
padding:18px 40px;
border:none;
border-radius:50px;
background:white;
color:#ff2d75;
font-size:20px;
cursor:pointer;
font-weight:bold;
}

.secret{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.message{
background:linear-gradient(45deg,#ff4d88,#ff99bb);
padding:35px;
border-radius:20px;
max-width:700px;
text-align:center;
line-height:2.2;
font-size:22px;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">رُبى 💖</h1>

<div class="text">
في ناس من أول لحظة بيصيرو مختلفين ✨<br>
وانتِ كنتِ منهم 🌙
</div>

<button class="btn" onclick="openSecret(); playMusic(); spawnHeart();">
افتحي الرسالة 💌
</button>

</div>

<div class="secret" id="secretBox">
<div class="message">

رُبى... ❤️<br><br>

وجودك بحياتي شي ما بينوصف ✨<br>
وما بدي شي غير شوفك مبسوطة 💖<br><br>

"أنا معكِ لآخر الدنيا" 🌙<br><br>

<button onclick="closeSecret()">إغلاق</button>

</div>
</div>

<!-- 🎧 صوت -->
<audio id="bgMusic" loop>
<source src="https://drive.google.com/uc?export=download&id=1Apu3Y4mQOqnX1FJj3u7GMiO2NK5aLr69" type="audio/mpeg">
</audio>

<script>

/* نجوم قليلة جداً (خفيفة) */
for(let i=0;i<20;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}

/* قلب واحد عند الضغط فقط */
function spawnHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="0px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);
}

/* الرسالة */
function openSecret(){
document.getElementById("secretBox").style.display="flex";
}

function closeSecret(){
document.getElementById("secretBox").style.display="none";
}

/* الصوت (آمن + بدون تهنيج) */
function playMusic(){
let audio=document.getElementById("bgMusic");
audio.volume=0.5;
audio.play().catch(()=>{});
}

</script>

</body>
</html>
