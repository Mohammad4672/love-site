<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruba 💖</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f001f,#2b003d,#ff2d75);
font-family:Tahoma;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* title فوق بالنص */
h1{
position:absolute;
top:20px;
font-size:55px;
text-shadow:0 0 20px #ff99cc;
}

/* النص */
.text{
font-size:22px;
white-space:pre-line;
text-align:center;
max-width:80%;
min-height:150px;
}

/* button */
.btn{
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff2d75;
font-size:18px;
cursor:pointer;
font-weight:bold;
margin-top:20px;
}

/* hearts */
.heart{
position:absolute;
bottom:-40px;
font-size:18px;
animation:float 7s linear forwards;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* قلب السر */
.secret{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.heartBox{
font-size:22px;
text-align:center;
background:radial-gradient(circle,#ff4d88,#ff99bb);
padding:40px;
border-radius:50%;
width:320px;
height:320px;
display:flex;
align-items:center;
justify-content:center;
line-height:1.8;
box-shadow:0 0 30px rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<h1>Ruba 💖</h1>

<button class="btn" onclick="start()">
افتحي القلب 💌
</button>

<div class="text" id="text"></div>

<!-- Secret Heart -->
<div class="secret" id="secret">
<div class="heartBox">
أنا معكِ لآخر الدنيا ❤️<br>
وبحبككك يا رُبى 💖
</div>
</div>

<script>

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},600);

/* typing */
let msg =
"قلبي انا كتيررر بحبك وبحياتي ما رح حب غيرك...\n"+
"وما رح يكون بقلبي غيرك ❤️\n"+
"يا احلى بنت بالدنيا ✨\n\n"+
"بدي ياكي قوية دايماً 🌙\n"+
"وانشالله بشوف ضحكتك دايماً 💕\n"+
"وبشوفك احلى محامية 👩‍⚖️\n\n"+
"بس روقيلي حالك يا عمري وما تفكري كتير 🫶\n"+
"بحبككك يا احلى رُبى بالدنيا 💖";

let i=0;

function type(){
if(i < msg.length){
document.getElementById("text").innerText += msg.charAt(i);
i++;
setTimeout(type,35);
} else {
setTimeout(()=>{
document.getElementById("secret").style.display="flex";
},800);
}
}

function start(){
document.querySelector(".btn").style.display="none";
type();
}

</script>

</body>
</html>
