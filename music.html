<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Game</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#120018,#2a003d,#3f0066);
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* موسيقى */
audio{
    display:none;
}

/* الحاوية */
.container{
    display:grid;
    grid-template-columns:repeat(2,160px);
    gap:20px;
    z-index:2;
}

/* الصندوق */
.box{
    width:160px;
    height:160px;
    perspective:1000px;
    cursor:pointer;
    position:relative;
    transition:0.3s;
}

.box:hover{
    transform:scale(1.05);
}

/* الداخل */
.box-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:1s;
}

.box.open .box-inner{
    transform:rotateX(180deg);
}

/* الوجوه */
.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    backface-visibility:hidden;
    box-shadow:0 0 20px rgba(255,255,255,0.15);
}

/* الأمام */
.front{
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.2);
    font-size:45px;
}

/* الخلف */
.back{
    background:rgba(255,255,255,0.15);
    transform:rotateX(180deg);
    font-size:20px;
    padding:15px;
    text-align:center;
}

/* الرسالة */
.love-text{
    position:fixed;
    bottom:70px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.65);
    padding:15px 25px;
    border-radius:15px;
    display:none;
    font-size:22px;
    animation:fade 0.4s;
    z-index:5;
}

@keyframes fade{
    from{opacity:0; transform:translateX(-50%) scale(0.8);}
    to{opacity:1; transform:translateX(-50%) scale(1);}
}

/* القلوب */
.heart{
    position:absolute;
    color:pink;
    animation:float 4s linear forwards;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    to{
        transform:translateY(-250px) scale(1.8);
        opacity:0;
    }
}

/* النهاية */
.final{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.7);
    background:rgba(0,0,0,0.85);
    padding:35px;
    border-radius:25px;
    text-align:center;
    font-size:26px;
    display:none;
    z-index:10;
    animation:popup 0.8s forwards;
    box-shadow:0 0 30px rgba(255,105,180,0.5);
}

@keyframes popup{
    to{
        transform:translate(-50%,-50%) scale(1);
    }
}

/* نجوم */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:0.2;}
    to{opacity:1;}
}

</style>
</head>

<body>

<!-- موسيقى -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<!-- النجوم -->
<script>
for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.animationDuration=(1+Math.random()*3)+"s";
    document.body.appendChild(s);
}
</script>

<!-- الصناديق -->
<div class="container">

<div class="box" onclick="openBox(this,'انتي الأمان بحياتي ❤️')">
<div class="box-inner">
<div class="front">💌</div>
<div class="back">❤️</div>
</div>
</div>

<div class="box" onclick="openBox(this,'بحبك بكل تفاصيلك 🥹')">
<div class="box-inner">
<div class="front">💖</div>
<div class="back">💞</div>
</div>
</div>

<div class="box" onclick="openBox(this,'وجودك بيكملني 🌎')">
<div class="box-inner">
<div class="front">🌹</div>
<div class="back">💘</div>
</div>
</div>

<div class="box" onclick="finalBox(this)">
<div class="box-inner">
<div class="front">💎</div>
<div class="back">✨</div>
</div>
</div>

</div>

<!-- النص -->
<div class="love-text" id="text"></div>

<!-- النهاية -->
<div class="final" id="final">
💖 هيدا قلبي إلك بس 💖<br><br>
ما في بعدك ولا في غيرك 🥹
</div>

<script>

let music = document.getElementById("music");
let started = false;

/* فتح صندوق */
function openBox(el,msg){

    if(el.classList.contains("open")) return;

    el.classList.add("open");

    showMessage(msg);

    hearts();

    playMusic();
}

/* النهاية */
function finalBox(el){

    if(el.classList.contains("open")) return;

    el.classList.add("open");

    hearts();

    playMusic();

    setTimeout(()=>{

        document.getElementById("final").style.display="block";

        megaHearts();

    },900);
}

/* رسالة */
function showMessage(msg){

    let t=document.getElementById("text");

    t.innerHTML=msg;

    t.style.display="block";

    setTimeout(()=>{
        t.style.display="none";
    },2200);
}

/* قلوب */
function hearts(){

    for(let i=0;i<12;i++){

        let h=document.createElement("div");

        h.className="heart";

        h.innerHTML="❤️";

        h.style.left=Math.random()*100+"vw";

        h.style.top="85%";

        h.style.fontSize=(15+Math.random()*25)+"px";

        document.body.appendChild(h);

        setTimeout(()=>{
            h.remove();
        },4000);
    }
}

/* قلوب قوية للنهاية */
function megaHearts(){

    for(let i=0;i<40;i++){

        let h=document.createElement("div");

        h.className="heart";

        h.innerHTML="💖";

        h.style.left=Math.random()*100+"vw";

        h.style.top="100%";

        h.style.fontSize=(20+Math.random()*35)+"px";

        document.body.appendChild(h);

        setTimeout(()=>{
            h.remove();
        },5000);
    }
}

/* تشغيل الموسيقى */
function playMusic(){

    if(!started){

        music.volume = 0.6;

        music.play().catch(()=>{});

        started=true;
    }
}

</script>

</body>
</html>
