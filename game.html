<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Game</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  overflow:hidden;
  color:white;
  background:radial-gradient(circle,#3f0066,#120018);
}

/* موسيقى */
audio{display:none;}

/* grid */
.container{
  display:grid;
  grid-template-columns:repeat(2,170px);
  gap:20px;
  z-index:2;
}

/* box */
.box{
  width:170px;
  height:170px;
  perspective:900px;
  cursor:pointer;
}

.box-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

.box.open .box-inner{
  transform:rotateY(180deg) rotateX(10deg);
}

/* faces */
.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  backface-visibility:hidden;
  box-shadow:0 0 25px rgba(255,255,255,0.1);
}

.front{
  background:rgba(255,255,255,0.08);
  font-size:45px;
}

.back{
  background:rgba(255,255,255,0.15);
  transform:rotateY(180deg);
  font-size:18px;
  text-align:center;
  padding:10px;
}

/* message */
.msg{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:15px;
  display:none;
  font-size:20px;
}

/* hearts */
.heart{
  position:absolute;
  color:pink;
  animation:float 4s linear forwards;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);opacity:0;}
}

/* final */
.final{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.7);
  background:rgba(0,0,0,0.85);
  padding:40px;
  border-radius:25px;
  text-align:center;
  display:none;
  font-size:26px;
  animation:pop 0.8s forwards;
}

@keyframes pop{
  to{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="box" onclick="openBox(this,'انتي روحي ❤️')">
<div class="box-inner">
<div class="front">💌</div>
<div class="back">❤️</div>
</div>
</div>

<div class="box" onclick="openBox(this,'بحبك بكل لحظة 🥹')">
<div class="box-inner">
<div class="front">💖</div>
<div class="back">💞</div>
</div>
</div>

<div class="box" onclick="openBox(this,'إنتي عالمي 🌎')">
<div class="box-inner">
<div class="front">🌹</div>
<div class="back">💘</div>
</div>
</div>

<div class="box" onclick="finalBox(this)">
<div class="box-inner">
<div class="front">💎</div>
<div class="back">✨</div>
</div>
</div>

</div>

<div class="msg" id="msg"></div>

<div class="final" id="final">
💖 إنتي كل حياتي 💖<br><br>
ما في غيرك أبداً 🥹
</div>

<script>

let music=document.getElementById("music");
let started=false;

function openBox(el,msg){

  el.classList.add("open");

  show(msg);
  hearts();
  playMusic();
}

function finalBox(el){

  el.classList.add("open");

  hearts();
  playMusic();

  setTimeout(()=>{
    document.getElementById("final").style.display="block";
    megaHearts();
  },800);
}

function show(msg){

  let m=document.getElementById("msg");
  m.innerHTML=msg;
  m.style.display="block";

  setTimeout(()=>m.style.display="none",2000);
}

function hearts(){

  for(let i=0;i<15;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.top="90%";
    h.style.fontSize=(15+Math.random()*25)+"px";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),4000);
  }
}

function megaHearts(){

  for(let i=0;i<40;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.top="100%";
    h.style.fontSize=(20+Math.random()*35)+"px";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),5000);
  }
}

function playMusic(){

  if(!started){
    music.volume=0.6;
    music.play().catch(()=>{});
    started=true;
  }
}

</script>

</body>
</html>
