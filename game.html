<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Game</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  overflow:hidden;
  color:white;
  background:radial-gradient(circle,#3f0066,#120018);
  transition:0.2s;
}

.container{
  display:grid;
  grid-template-columns:repeat(2,170px);
  gap:20px;
}

/* الصناديق */
.box{
  width:170px;
  height:170px;
  perspective:900px;
  cursor:pointer;
}

.box-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

.box.open .box-inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  backface-visibility:hidden;
}

.front{
  background:rgba(255,255,255,0.08);
  font-size:45px;
}

.back{
  background:rgba(255,255,255,0.15);
  transform:rotateY(180deg);
}

/* القلوب */
.heart{
  position:absolute;
  color:pink;
  animation:float 4s linear forwards, beat 0.8s infinite;
  pointer-events:none;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);opacity:0;}
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

/* اهتزاز */
@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(1px,-1px);}
  50%{transform:translate(-1px,1px);}
  75%{transform:translate(1px,1px);}
  100%{transform:translate(0,0);}
}

.shake{
  animation:shake 0.2s;
}

</style>
</head>

<body>

<!-- موسيقى -->
<audio id="music" loop>
<source src="https://files.catbox.moe/8m0n4p.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="box" onclick="openBox(this)">
<div class="box-inner">
<div class="front">💌</div>
<div class="back">❤️</div>
</div>
</div>

<div class="box" onclick="openBox(this)">
<div class="box-inner">
<div class="front">💖</div>
<div class="back">💞</div>
</div>
</div>

<div class="box" onclick="openBox(this)">
<div class="box-inner">
<div class="front">🌹</div>
<div class="back">💘</div>
</div>
</div>

<div class="box" onclick="finalBox(this)">
<div class="box-inner">
<div class="front">💎</div>
<div class="back">✨</div>
</div>
</div>

</div>

<script>

let music = document.getElementById("music");
let started = false;

/* فتح الصندوق */
function openBox(el){

  el.classList.add("open");

  startEverything();
}

/* الصندوق الأخير */
function finalBox(el){

  el.classList.add("open");

  startEverything();
}

/* تشغيل كل شيء */
function startEverything(){

  playMusic();
  hearts();
  heartbeat();
}

/* موسيقى */
function playMusic(){

  if(!started){
    music.volume = 0.6;
    music.play().catch(()=>{});
    started = true;
  }
}

/* قلوب */
function hearts(){

  for(let i=0;i<6;i++){

    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";

    h.style.left=Math.random()*100+"vw";
    h.style.top="90%";
    h.style.fontSize=(15+Math.random()*25)+"px";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),4000);
  }
}

/* نبض + اهتزاز */
function heartbeat(){

  document.body.classList.add("shake");

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },200);

  setTimeout(heartbeat,800);
}

</script>

</body>
</html>
